name: Build Windows Installer

# Trigger: push a version tag (e.g. v1.0.0) or run manually from the
# Actions tab.  The compiled WifiTool-Setup.exe is uploaded as a build
# artifact and, on a tag push, attached to the GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build WifiTool-Setup.exe
    runs-on: windows-latest
    permissions:
      contents: write   # needed to upload files to GitHub Releases

    steps:
      # ----------------------------------------------------------------
      # 1. Check out source
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Set up Python
      # ----------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ----------------------------------------------------------------
      # 3. Install Python runtime + build dependencies
      # ----------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller==6.3.0" -r requirements.txt

      # ----------------------------------------------------------------
      # 4. Install Inno Setup 6 (via Chocolatey — pre-installed on windows-latest)
      # ----------------------------------------------------------------
      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      # ----------------------------------------------------------------
      # 5. Create the assets directory
      # ----------------------------------------------------------------
      - name: Create assets directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path installer\assets

      # ----------------------------------------------------------------
      # 6. Download and extract aircrack-ng Windows binaries
      # ----------------------------------------------------------------
      - name: Download aircrack-ng
        shell: pwsh
        run: |
          $version = "1.7"
          $url = "https://download.aircrack-ng.org/aircrack-ng-$version-win.zip"
          $zip  = "installer\assets\aircrack-ng.zip"
          $tmp  = "installer\assets\_aircrack_tmp"
          $dest = "installer\assets\aircrack-ng"

          Write-Host "Downloading aircrack-ng $version..."
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing

          Write-Host "Extracting..."
          Expand-Archive -Path $zip -DestinationPath $tmp -Force
          Remove-Item $zip

          # The directory containing airodump-ng.exe is the one we want
          $exeFile = Get-ChildItem -Path $tmp -Recurse -Filter "airodump-ng.exe" |
                     Select-Object -First 1
          if (-not $exeFile) { throw "airodump-ng.exe not found in archive" }
          Move-Item -Path $exeFile.DirectoryName -Destination $dest
          Remove-Item $tmp -Recurse -Force -ErrorAction SilentlyContinue

          Write-Host "aircrack-ng ready: $dest"

      # ----------------------------------------------------------------
      # 7. Download and extract hashcat
      # ----------------------------------------------------------------
      - name: Download hashcat
        shell: pwsh
        run: |
          $version = "6.2.6"
          $url     = "https://hashcat.net/files/hashcat-$version.7z"
          $archive = "installer\assets\hashcat.7z"
          $tmp     = "installer\assets\_hashcat_tmp"
          $dest    = "installer\assets\hashcat"

          # Find 7-Zip (installed by default on windows-latest; handle both paths)
          $sevenZip = @(
            "C:\Program Files\7-Zip\7z.exe",
            "C:\Program Files (x86)\7-Zip\7z.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $sevenZip) { throw "7-Zip not found" }

          Write-Host "Downloading hashcat $version..."
          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing

          Write-Host "Extracting with 7-Zip ($sevenZip)..."
          & $sevenZip x $archive "-o$tmp" -y | Out-Null
          Remove-Item $archive

          # The archive has a single top-level directory
          $topDir = Get-ChildItem -Path $tmp -Directory | Select-Object -First 1
          if (-not $topDir) { throw "hashcat directory not found in archive" }
          Move-Item -Path $topDir.FullName -Destination $dest
          Remove-Item $tmp -Recurse -Force -ErrorAction SilentlyContinue

          Write-Host "hashcat ready: $dest"

      # ----------------------------------------------------------------
      # 8. Download Npcap installer
      # ----------------------------------------------------------------
      - name: Download Npcap
        shell: pwsh
        run: |
          $version = "1.79"
          $url  = "https://npcap.com/dist/npcap-$version.exe"
          $dest = "installer\assets\npcap-installer.exe"
          Write-Host "Downloading Npcap $version..."
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          Write-Host "Npcap ready: $dest"

      # ----------------------------------------------------------------
      # 9. Download and filter wordlists for WPA2 (8-63 chars)
      # ----------------------------------------------------------------
      - name: Download and filter wordlists
        shell: python
        run: |
          import urllib.request, gzip, os, sys

          SOURCES = [
              # (label, url, is_gzip)
              ("rockyou_2025_00", "https://raw.githubusercontent.com/josuamarcelc/common-password-list/main/rockyou_2025_00.txt", False),
              ("rockyou_2025_01", "https://raw.githubusercontent.com/josuamarcelc/common-password-list/main/rockyou_2025_01.txt", False),
              ("rockyou_2025_02", "https://raw.githubusercontent.com/josuamarcelc/common-password-list/main/rockyou_2025_02.txt", False),
              ("rockyou_2025_03", "https://raw.githubusercontent.com/josuamarcelc/common-password-list/main/rockyou_2025_03.txt", False),
              ("rockyou_2025_04", "https://raw.githubusercontent.com/josuamarcelc/common-password-list/main/rockyou_2025_04.txt", False),
              ("rockyou_2025_05", "https://raw.githubusercontent.com/josuamarcelc/common-password-list/main/rockyou_2025_05.txt", False),
              ("totse.info",      "https://raw.githubusercontent.com/josuamarcelc/common-password-list/main/totse.info.txt",       False),
              ("openwall",        "https://raw.githubusercontent.com/josuamarcelc/common-password-list/main/openwall.net.gz",      True),
          ]

          out_dir = os.path.join("installer", "assets", "wordlists")
          os.makedirs(out_dir, exist_ok=True)

          wpa2_file = os.path.join(out_dir, "wifitool-wordlist-wpa2.txt")
          full_file  = os.path.join(out_dir, "wifitool-wordlist-full.txt")

          wpa2_total = full_total = 0
          with open(wpa2_file, "w", encoding="utf-8", errors="ignore") as fwpa2, \
               open(full_file,  "w", encoding="utf-8", errors="ignore") as ffull:
              for label, url, is_gz in SOURCES:
                  print(f"Downloading {label}...")
                  try:
                      with urllib.request.urlopen(url, timeout=120) as resp:
                          data = resp.read()
                      if is_gz:
                          data = gzip.decompress(data)
                      wpa2_count = full_count = 0
                      for line in data.decode("utf-8", errors="ignore").splitlines():
                          word = line.strip()
                          if not word:
                              continue
                          ffull.write(word + "\n")
                          full_count += 1
                          if 8 <= len(word) <= 63:
                              fwpa2.write(word + "\n")
                              wpa2_count += 1
                      wpa2_total += wpa2_count
                      full_total  += full_count
                      print(f"  {full_count:,} total  |  {wpa2_count:,} WPA2-compatible")
                  except Exception as exc:
                      print(f"  WARNING: failed to download {label}: {exc}", file=sys.stderr)

          print(f"\nWPA2 wordlist : {wpa2_file}  ({os.path.getsize(wpa2_file)/1024/1024:.1f} MB, {wpa2_total:,} passwords)")
          print(f"Full wordlist : {full_file}   ({os.path.getsize(full_file)/1024/1024:.1f} MB, {full_total:,} passwords)")

      # ----------------------------------------------------------------
      # 10. Build WifiTool.exe with PyInstaller
      # ----------------------------------------------------------------
      - name: Build with PyInstaller
        run: pyinstaller WifiTool.spec --noconfirm

      # ----------------------------------------------------------------
      # 10. Compile the Inno Setup installer
      # ----------------------------------------------------------------
      - name: Compile installer with Inno Setup
        shell: pwsh
        run: |
          # Inno Setup 6 is installed via Chocolatey above; check both paths
          $iscc = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found — Inno Setup install may have failed" }
          & $iscc installer\WifiTool.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC.exe failed" }

      # ----------------------------------------------------------------
      # 11. Upload installer as a build artifact
      # ----------------------------------------------------------------
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WifiTool-Setup
          path: installer/Output/WifiTool-Setup-*.exe
          if-no-files-found: error

      # ----------------------------------------------------------------
      # 12. Attach installer to the GitHub Release (tag pushes only)
      # ----------------------------------------------------------------
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/WifiTool-Setup-*.exe
